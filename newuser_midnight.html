<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Direct Channel</title>
  <meta name="description" content="Direct secure chat with Midnight.">
  <link rel="stylesheet" href="css/midnight_chat.css" />
</head>
<body class="chat-retro newuser-midnight">
  <div class="app app-two">
    <main class="pane pane-center" aria-live="polite">
      <div class="chat-header">
        <div class="chat-header-main">
          <img src="assets/images/member-Midnight.jpeg" alt="Midnight" class="chat-header-avatar" />
          <div>
            <h2 id="channelTitle">Midnight</h2>
            <p id="channelSubtitle" class="chat-subtitle">Encrypted direct line for sensitive updates</p>
            <div class="channel-switcher" aria-label="Direct channel switcher">
              <button type="button" class="channel-switch active" data-channel="midnight">Midnight</button>
              <button type="button" class="channel-switch" data-channel="psychologist">心理医生</button>
            </div>
          </div>
        </div>
        <a class="logout chat-header-back" href="chat_newuser.html">Back to Group Chat</a>
      </div>

      <div class="messages-shell">
        <section id="messages" class="messages" aria-label="Direct messages"></section>
      </div>

      <form id="composer" class="composer" autocomplete="off" aria-label="Direct message composer">
        <textarea id="input" rows="1" placeholder="Message Midnight - Press Enter to send, Shift+Enter for new line"></textarea>
        <button class="send" type="submit" aria-label="Send direct message">Send</button>
      </form>
    </main>

    <aside class="pane pane-right newuser-midnight-side" aria-label="Reserved sidebar"></aside>
  </div>

  <script src="js/chat-base.js" defer></script>
  <script src="js/newuser_midnight.js" defer></script>
</body>
</html>
