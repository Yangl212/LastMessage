<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Midnight Direct Channel</title>
  <meta name="description" content="Direct secure chat with Midnight.">
  <link rel="stylesheet" href="css/midnight_chat.css" />
</head>
<body class="newuser-midnight">
  <header class="app-header">
    <div class="header-left">
      <div class="brand-dot" aria-hidden="true"></div>
      <strong>Direct Channel — Midnight</strong>
    </div>
    <div class="header-right">
      <a class="logout" href="chat_newuser.html">Back to Group Chat</a>
    </div>
  </header>

  <div class="app app-single">
    <main class="pane pane-center" aria-live="polite">
      <div class="chat-header">
        <div>
          <h2>Midnight</h2>
          <p class="chat-subtitle">Encrypted direct line for sensitive updates</p>
        </div>
      </div>

      <section id="messages" class="messages" aria-label="Direct messages"></section>

      <form id="composer" class="composer" autocomplete="off" aria-label="Direct message composer">
        <textarea id="input" rows="1" placeholder="Message Midnight - Press Enter to send, Shift+Enter for new line"></textarea>
        <button class="send" type="submit" aria-label="Send direct message">Send</button>
      </form>
    </main>
  </div>

  <footer class="app-footer">
    <small>(4/20)</small>
  </footer>

  <script src="js/chat-base.js" defer></script>
  <script src="js/newuser_midnight.js" defer></script>
</body>
</html>
