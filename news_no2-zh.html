<body>
  <header class="news-header">
    <div class="brand">本地日报</div>
  </header>

  <main class="article-wrap">
    <article class="article-card">
      <h1>15岁女孩意外坠楼身亡，调查仍在进行中</h1>
      <img src="assets/images/No2.png" alt="与调查相关的现场照片" class="hero-image" />

      <p>当地政府周二确认，一名15岁女孩在一栋住宅楼意外坠楼后身亡。</p>
      <p>紧急救援人员于下午5时许赶赴现场。救护人员将该少女送往附近医院，后因伤重不治身亡。</p>
      <p>警方表示，事件目前仍在调查中。初步调查结果显示，暂无明显犯罪迹象，但官员强调调查仍在进行，待确认后将进一步公布详情。</p>
      <p>该学生就读的学校发表简短声明，向其家属表达慰问，并表示将为受此事件影响的师生提供心理辅导资源。</p>
      <p>当局提醒公众注意安全，在遇到危机时应寻求专业支持。任何掌握相关信息的人士均被鼓励联系当地执法部门。</p>
      <p>随着调查推进，将适时发布进一步消息。</p>
    </article>
  </main>
