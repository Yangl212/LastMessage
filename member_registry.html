<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Member Registry</title>
  <link rel="stylesheet" href="css/member_registry.css" />
</head>
<body>
  <main class="sheet-wrap">
    <h1>Member Registry</h1>

    <section class="sheet" aria-label="Member Registry Table">
      <table>
        <thead>
          <tr>
            <th>Real Name</th>
            <th>Age</th>
            <th class="death-col">Death Report</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Daniel Harper</td><td>24</td><td class="death-col"><button type="button" id="reportTrigger" class="report-redacted" aria-label="Open redacted report"></button></td></tr>
          <tr><td>Olivia Bennett</td><td>15</td><td class="death-col"><a href="news_no2.html" target="_blank" rel="noopener noreferrer">fell from a building</a></td></tr>
          <tr><td>Marcus Reed</td><td>20</td><td class="death-col"></td></tr>
          <tr><td>Sophia Caldwell</td><td>13</td><td class="death-col"></td></tr>
          <tr><td>Ethan Morales</td><td>14</td><td class="death-col"></td></tr>
          <tr><td>Amelia Grant</td><td>16</td><td class="death-col"></td></tr>
          <tr><td>Allery Lin</td><td>15</td><td class="death-col"></td></tr>
          <tr><td>Isabella Clarke</td><td>14</td><td class="death-col"></td></tr>
          <tr><td>Noah Sinclair</td><td>13</td><td class="death-col"></td></tr>
          <tr><td>Charlotte Hayes</td><td>15</td><td class="death-col"></td></tr>
          <tr><td>Julian Foster</td><td>11</td><td class="death-col"></td></tr>
          <tr><td>Evelyn Brooks</td><td>16</td><td class="death-col"></td></tr>
          <tr><td>Adrian Cole</td><td>14</td><td class="death-col"></td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <button type="button" id="nightToggle" class="night-toggle" aria-pressed="false">Midnight Mode</button>

  <div class="modal" id="identityModal" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="identityTitle">
      <h2 id="identityTitle">Who Am I?</h2>
      <input id="identityInput" type="text" placeholder="Enter text..." autocomplete="off" />
      <div id="identityError" class="identity-error" hidden>ERROR</div>
      <button type="button" id="identityConfirm">Confirm</button>
    </div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById('nightToggle');
      const reportTrigger = document.getElementById('reportTrigger');
      const modal = document.getElementById('identityModal');
      const modalInput = document.getElementById('identityInput');
      const modalError = document.getElementById('identityError');
      const modalConfirm = document.getElementById('identityConfirm');
      if (!btn) return;

      btn.addEventListener('click', function () {
        const enabled = document.body.classList.toggle('midnight-mode');
        btn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
      });

      function openModal() {
        if (!modal) return;
        modal.hidden = false;
        if (modalError) modalError.hidden = true;
        if (modalInput) modalInput.focus();
      }

      function closeModal() {
        if (!modal) return;
        modal.hidden = true;
        if (modalInput) modalInput.value = '';
        if (modalError) modalError.hidden = true;
      }

      function handleConfirm() {
        const value = (modalInput?.value || '').trim().toLowerCase();
        if (value === 'midnight') {
          window.location.href = 'danger_loading.html';
          return;
        }

        if (modalError) modalError.hidden = false;
        window.setTimeout(closeModal, 900);
      }

      reportTrigger?.addEventListener('click', openModal);
      modal?.addEventListener('click', function (e) {
        if (e.target && e.target.hasAttribute('data-close-modal')) {
          closeModal();
        }
      });
      modalConfirm?.addEventListener('click', handleConfirm);
      modalInput?.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleConfirm();
        }
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal && !modal.hidden) {
          closeModal();
        }
      });
    })();
  </script>
</body>
</html>
